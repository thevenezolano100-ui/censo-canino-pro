<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Manual Médico Oficial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">📖 Manuales y Protocolos Epidemiológicos</h2>
        <a href="/" class="btn btn-secondary shadow-sm">Volver</a>
    </div>

    {% if current_user.rol == 'Admin' %}
    <div class="card p-4 mb-4 border-0 shadow-sm" style="border-radius:12px; border-left: 5px solid #0d6efd !important;">
        <h5 class="text-primary fw-bold">⚙️ Publicar Documento Técnico (PDF)</h5>
        <form method="POST" action="/subir_manual" enctype="multipart/form-data" class="d-flex gap-2">
            <input type="file" name="manual_archivo" class="form-control" accept="application/pdf" required>
            <button type="submit" class="btn btn-primary">Publicar</button>
        </form>
    </div>
    {% endif %}

    <div class="card p-4 border-0 shadow-sm" style="border-radius:15px;">
        {% if documento %}
            <embed src="{{ url_for('static', filename='uploads/' + documento.archivo) }}" type="application/pdf" style="width:100%; height:750px; border-radius:10px;">
        {% else %}
            <div class="text-center p-5 text-muted"><h4>📚 El protocolo oficial se encuentra en desarrollo</h4></div>
        {% endif %}
    </div>
</div>
</body>
</html>
