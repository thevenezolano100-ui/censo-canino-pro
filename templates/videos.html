<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evidencias Multimedia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">🎬 Repositorio Multimedia de Campo</h2>
        <a href="/" class="btn btn-secondary shadow-sm">Volver</a>
    </div>

    {% if current_user.rol == 'Admin' %}
    <div class="card p-4 mb-4 border-0 shadow-sm" style="border-radius:12px; border-left: 5px solid #198754 !important;">
        <h5 class="text-success fw-bold">⚙️ Cargar / Reemplazar Video (.mp4)</h5>
        <form method="POST" action="/subir_video" enctype="multipart/form-data" class="d-flex gap-2">
            <input type="file" name="video_archivo" class="form-control" accept="video/mp4" required>
            <button type="submit" class="btn btn-success">Actualizar</button>
        </form>
    </div>
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card bg-dark p-2 text-white shadow" style="border-radius:15px; overflow:hidden;">
                {% if video %}
                    <video width="100%" controls style="border-radius:10px;">
                        <source src="{{ url_for('static', filename='uploads/' + video.archivo) }}" type="video/mp4">
                    </video>
                {% else %}
                    <div class="text-center p-5 text-muted"><h4>🎥 Ningún video publicado aún</h4></div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
