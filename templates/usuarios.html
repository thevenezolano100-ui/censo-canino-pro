<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración de Usuarios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-top: 20px;}
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h2 class="fw-bold m-0" style="color: #6f42c1;">👥 Panel de Control de Usuarios</h2>
        <a href="/" class="btn btn-secondary shadow-sm">Volver al Sistema</a>
    </div>

    <div class="card card-custom p-4 bg-white">
        <h5 class="mb-3">Lista de Acceso Restringido</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Usuario (Alias)</th><th>Nombre Real</th><th>Cédula</th><th>Rol Asignado</th><th>Seguridad</th></tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td>{{ u.id }}</td>
                        <td class="fw-bold">{{ u.username }}</td>
                        <td>{{ u.nombre }} {{ u.apellido }}</td>
                        <td>{{ u.cedula }}</td>
                        <td><span class="badge {% if u.rol == 'Admin' %}bg-primary{% else %}bg-secondary{% endif %}">{{ u.rol }}</span></td>
                        <td>
                            <!-- Restablecer Clave (Solo Admin) -->
                            <form method="POST" action="/usuarios/cambiar_clave/{{ u.id }}" class="d-flex gap-2">
                                <input type="password" name="nueva_password" class="form-control form-control-sm" placeholder="Nueva Clave" style="width: 150px;" required>
                                <button type="submit" class="btn btn-sm text-white" style="background-color: #6f42c1;">Cambiar</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
