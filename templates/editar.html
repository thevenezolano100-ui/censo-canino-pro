<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Canino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif;}
        #map-editar { height: 300px; border-radius: 12px; border: 2px solid #dee2e6; }
    </style>
</head>
<body>
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 border-0 shadow-sm" style="border-radius:15px;">
                <h3 class="text-warning mb-4 border-bottom pb-2">✏️ Editar Expediente: {{ perro.nombre or 'S/N' }}</h3>
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6"><label class="form-label small fw-bold">Nombre</label><input type="text" name="nombre" class="form-control" value="{{ perro.nombre or '' }}"></div>
                        <div class="col-md-6"><label class="form-label small fw-bold">Raza</label><input type="text" name="raza" class="form-control" value="{{ perro.raza or '' }}" required></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4"><label class="form-label small fw-bold">Edad</label><input type="text" name="edad" class="form-control" value="{{ perro.edad or '' }}" required></div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Sexo</label>
                            <select name="sexo" class="form-select">
                                <option value="Macho" {% if perro.sexo=='Macho' %}selected{% endif %}>Macho</option>
                                <option value="Hembra" {% if perro.sexo=='Hembra' %}selected{% endif %}>Hembra</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Tenencia</label>
                            <select name="estado_tenencia" class="form-select">
                                <option value="Con dueño" {% if perro.estado_tenencia=='Con dueño' %}selected{% endif %}>Con dueño</option>
                                <option value="Callejero" {% if perro.estado_tenencia=='Callejero' %}selected{% endif %}>Callejero</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label small fw-bold">Propietario</label><input type="text" name="nombre_propietario" class="form-control" value="{{ perro.nombre_propietario or '' }}"></div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6"><label class="form-label small fw-bold">Sector</label><input type="text" name="sector" class="form-control" value="{{ perro.sector or '' }}" required></div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Salud</label>
                            <select name="estado_salud" class="form-select">
                                <option value="Sano" {% if perro.estado_salud=='Sano' %}selected{% endif %}>Sano</option>
                                <option value="Enfermo" {% if perro.estado_salud=='Enfermo' %}selected{% endif %}>Enfermo</option>
                                <option value="En Tratamiento" {% if perro.estado_salud=='En Tratamiento' %}selected{% endif %}>En Tratamiento</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-danger">Situación</label>
                        <select name="situacion" class="form-select border-danger">
                            <option value="Censo Normal" {% if perro.situacion=='Censo Normal' %}selected{% endif %}>Censo Normal</option>
                            <option value="Situación de Hambre" {% if perro.situacion=='Situación de Hambre' %}selected{% endif %}>Situación de Hambre</option>
                            <option value="Abandono / Callejero" {% if perro.situacion=='Abandono / Callejero' %}selected{% endif %}>Abandono / Callejero</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label small fw-bold">Foto (Opcional)</label><input type="file" name="foto" class="form-control"></div>

                    <div class="row mb-4 bg-light p-3 rounded border">
                        <div class="col-6">
                            <div class="form-check"><input type="checkbox" name="esterilizado" class="form-check-input" id="e" {% if perro.esterilizado %}checked{% endif %}><label for="e">Esterilizado</label></div>
                            <div class="form-check"><input type="checkbox" name="desparasitado" class="form-check-input" id="d" {% if perro.desparasitado %}checked{% endif %}><label for="d">Desparasitado</label></div>
                            <div class="form-check"><input type="checkbox" name="vacuna_parvovirus" class="form-check-input" id="p" {% if perro.vacuna_parvovirus %}checked{% endif %}><label for="p">Parvovirus</label></div>
                        </div>
                        <div class="col-6">
                            <div class="form-check"><input type="checkbox" name="vacuna_moquillo" class="form-check-input" id="m" {% if perro.vacuna_moquillo %}checked{% endif %}><label for="m">Moquillo</label></div>
                            <div class="form-check"><input type="checkbox" name="vacuna_triple" class="form-check-input" id="t" {% if perro.vacuna_triple %}checked{% endif %}><label for="t">Triple</label></div>
                            <div class="form-check"><input type="checkbox" name="vacuna_sextuple" class="form-check-input" id="s" {% if perro.vacuna_sextuple %}checked{% endif %}><label for="s">Sextuple</label></div>
                        </div>
                        <div class="col-12 mt-2 pt-2 border-top"><div class="form-check"><input type="checkbox" name="vacuna_antirrabica" class="form-check-input" id="a" {% if perro.vacuna_antirrabica %}checked{% endif %}><label for="a" class="text-danger fw-bold">💉 Antirrábica</label></div></div>
                    </div>

                    <div id="map-editar" class="mb-3"></div>
                    <input type="hidden" name="latitud" id="latitud" value="{{ perro.latitud or 0 }}">
                    <input type="hidden" name="longitud" id="longitud" value="{{ perro.longitud or 0 }}">

                    <div class="row g-2"><div class="col-6"><button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Guardar</button></div><div class="col-6"><a href="/" class="btn btn-secondary w-100">Cancelar</a></div></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var lat = parseFloat(document.getElementById('latitud').value) || 10.48;
        var lon = parseFloat(document.getElementById('longitud').value) || -66.90;
        var map = L.map('map-editar').setView([lat, lon], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([lat, lon], {draggable: true}).addTo(map);
        marker.on('dragend', function() { var p = marker.getLatLng(); document.getElementById('latitud').value = p.lat; document.getElementById('longitud').value = p.lng; });
        setTimeout(function(){ map.invalidateSize(); }, 500);
    });
</script>
</body>
</html>
