<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Expediente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-top: 40px; }
        .card-form { max-width: 600px; margin: auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="container">
    <div class="card card-form p-5 bg-white">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h4 class="text-primary fw-bold m-0">✏️ Editar Expediente</h4>
            <a href="/" class="btn btn-secondary btn-sm">Volver</a>
        </div>
        
        <form method="POST" action="/editar/{{ perro.id }}" enctype="multipart/form-data">
            
            <div class="row g-2 mb-3">
                <div class="col-md-6"><label class="small fw-bold text-muted">Nombre</label><input type="text" name="nombre" class="form-control" value="{{ perro.nombre }}"></div>
                <div class="col-md-6"><label class="small fw-bold text-muted">Raza</label><input type="text" name="raza" class="form-control" value="{{ perro.raza }}" required></div>
            </div>

            <!-- AQUÍ EL ADMIN PUEDE MOVER EL ANIMAL A HOSPITALIZACIÓN -->
            <div class="mb-3">
                <label class="fw-bold small text-danger">⚠️ Situación Clínica / Estado</label>
                <select name="situacion" class="form-select border-danger">
                    <option value="Censo Normal" {% if perro.situacion == 'Censo Normal' %}selected{% endif %}>Censo Normal (Sano / En Casa)</option>
                    <option value="Hospitalizado" {% if perro.situacion == 'Hospitalizado' %}selected{% endif %}>🏥 REQUERIR HOSPITALIZACIÓN CRÍTICA</option>
                    <option value="Situación de Hambre" {% if perro.situacion == 'Situación de Hambre' %}selected{% endif %}>Situación de Hambre</option>
                    <option value="Abandono / Callejero" {% if perro.situacion == 'Abandono / Callejero' %}selected{% endif %}>Abandono / Callejero</option>
                </select>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-4"><label class="small fw-bold text-muted">Edad</label><input type="text" name="edad" class="form-control" value="{{ perro.edad }}"></div>
                <div class="col-md-4"><label class="small fw-bold text-muted">Sexo</label>
                    <select name="sexo" class="form-select">
                        <option value="Macho" {% if perro.sexo == 'Macho' %}selected{% endif %}>Macho</option>
                        <option value="Hembra" {% if perro.sexo == 'Hembra' %}selected{% endif %}>Hembra</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="small fw-bold text-muted">Cubiculo/Jaula</label><input type="text" name="cubiculo_jaula" class="form-control text-danger fw-bold" value="{{ perro.cubiculo_jaula }}"></div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-6"><label class="small fw-bold text-muted">Dueño / Responsable</label><input type="text" name="nombre_propietario" class="form-control" value="{{ perro.nombre_propietario }}"></div>
                <div class="col-md-6"><label class="small fw-bold text-muted">WhatsApp</label><input type="text" name="whatsapp_propietario" class="form-control" value="{{ perro.whatsapp_propietario }}"></div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6"><label class="small fw-bold text-muted">Sector / Barrio</label><input type="text" name="sector" class="form-control" value="{{ perro.sector }}"></div>
                <div class="col-md-6"><label class="small fw-bold text-muted">Salud Actual</label>
                    <select name="estado_salud" class="form-select">
                        <option value="Sano" {% if perro.estado_salud == 'Sano' %}selected{% endif %}>Sano</option>
                        <option value="Enfermo" {% if perro.estado_salud == 'Enfermo' %}selected{% endif %}>Enfermo</option>
                        <option value="En Tratamiento" {% if perro.estado_salud == 'En Tratamiento' %}selected{% endif %}>En Tratamiento</option>
                    </select>
                </div>
            </div>

            <h6 class="border-bottom pb-2 text-muted">🩺 Controles Sanitarios</h6>
            <div class="row mb-4 bg-light p-3 rounded border">
                <div class="col-6">
                    <div class="form-check"><input type="checkbox" name="esterilizado" class="form-check-input" {% if perro.esterilizado %}checked{% endif %}> <label class="small">Esterilizado</label></div>
                    <div class="form-check"><input type="checkbox" name="desparasitado" class="form-check-input" {% if perro.desparasitado %}checked{% endif %}> <label class="small">Desparasitado</label></div>
                    <div class="form-check"><input type="checkbox" name="vacuna_parvovirus" class="form-check-input" {% if perro.vacuna_parvovirus %}checked{% endif %}> <label class="small">Parvovirus</label></div>
                </div>
                <div class="col-6">
                    <div class="form-check"><input type="checkbox" name="vacuna_moquillo" class="form-check-input" {% if perro.vacuna_moquillo %}checked{% endif %}> <label class="small">Moquillo</label></div>
                    <div class="form-check"><input type="checkbox" name="vacuna_triple" class="form-check-input" {% if perro.vacuna_triple %}checked{% endif %}> <label class="small">Triple</label></div>
                    <div class="form-check"><input type="checkbox" name="vacuna_sextuple" class="form-check-input" {% if perro.vacuna_sextuple %}checked{% endif %}> <label class="small">Sextuple</label></div>
                    <div class="form-check"><input type="checkbox" name="vacuna_antirrabica" class="form-check-input" {% if perro.vacuna_antirrabica %}checked{% endif %}> <label class="small text-danger fw-bold">Antirrábica</label></div>
                </div>
            </div>

            <label class="small fw-bold text-muted">Actualizar Foto (Opcional)</label>
            <input type="file" name="foto" class="form-control mb-4" accept="image/*">

            <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm">💾 Actualizar Expediente</button>
        </form>
    </div>
</div>
</body>
</html>
