<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes y Estadísticas | Censo Canino Pro</title>
    
    <!-- Librerías de Bootstrap y Chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-top: 30px;}
        
        /* Efectos inmersivos para las tarjetas */
        .card-custom { 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .card-custom:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }
        .stat-number { font-size: 3rem; font-weight: 800; line-height: 1; margin-top: 10px;}
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body>
<div class="container mb-5">
    
    <!-- Barra superior -->
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2">
        <h2 class="text-primary fw-bold m-0">📊 Panel de Reportes Epidemiológicos</h2>
        <a href="/" class="btn btn-secondary shadow-sm">Volver al Sistema</a>
    </div>

    <!-- TARJETAS DE INDICADORES CLAVE (KPIs) -->
    <div class="row mb-4 g-4">
        <div class="col-md-4">
            <div class="card card-custom p-4 bg-white text-center" style="border-bottom: 5px solid #0d6efd;">
                <h6 class="text-muted fw-bold text-uppercase mb-0">Total de Caninos Censados</h6>
                <div class="stat-number text-primary">{{ total_perros }}</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom p-4 bg-white text-center" style="border-bottom: 5px solid #10b981;">
                <h6 class="text-muted fw-bold text-uppercase mb-0">Consultas Clínicas Realizadas</h6>
                <div class="stat-number text-success">{{ total_consultas }}</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom p-4 bg-white text-center" style="border-bottom: 5px solid #f59e0b;">
                <h6 class="text-muted fw-bold text-uppercase mb-0">Citas por Atender</h6>
                <div class="stat-number text-warning">{{ citas_pendientes }}</div>
            </div>
        </div>
    </div>

    <!-- ZONA DE GRÁFICOS VISUALES -->
    <div class="row g-4">
        
        <!-- 1. Gráfico de Salud -->
        <div class="col-lg-4">
            <div class="card card-custom p-4 bg-white h-100">
                <h5 class="text-center mb-4 text-secondary fw-bold">Estado de Salud General</h5>
                <div class="chart-container">
                    <canvas id="graficoSalud"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 2. Gráfico de Sexo -->
        <div class="col-lg-4">
            <div class="card card-custom p-4 bg-white h-100">
                <h5 class="text-center mb-4 text-secondary fw-bold">Distribución por Sexo</h5>
                <div class="chart-container">
                    <canvas id="graficoSexo"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 3. Gráfico de Vacunas -->
        <div class="col-lg-4">
            <div class="card card-custom p-4 bg-white h-100">
                <h5 class="text-center mb-4 text-secondary fw-bold">Cobertura de Vacunación</h5>
                <div class="chart-container">
                    <canvas id="graficoVacunas"></canvas>
                </div>
            </div>
        </div>
        
    </div>
</div>

<!-- LÓGICA JAVASCRIPT PARA DIBUJAR LOS GRÁFICOS -->
<script>
    // 1. Recibimos los datos matemáticos desde Python (app.py)
    const datosSalud = [{{ sano_count }}, {{ enfermo_count }}, {{ tratamiento_count }}];
    const datosSexo = [{{ macho_count }}, {{ hembra_count }}];
    
    // Usamos 'tojson' para convertir listas de Python a formato compatible con JavaScript
    const etiquetasVacunas = {{ vacunas_labels | tojson | safe }};
    const conteoVacunas = {{ vacunas_counts | tojson | safe }};

    // 2. Configuración del Gráfico de Salud (Doughnut / Dona)
    new Chart(document.getElementById('graficoSalud'), {
        type: 'doughnut',
        data: {
            labels: ['Sanos', 'Enfermos', 'En Tratamiento'],
            datasets: [{
                data: datosSalud,
                backgroundColor: ['#10b981', '#ef4444', '#f59e0b'],
                borderWidth: 2,
                borderColor: '#ffffff',
                hoverOffset: 10
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' } }
        }
    });

    // 3. Configuración del Gráfico de Sexo (Pie / Pastel)
    new Chart(document.getElementById('graficoSexo'), {
        type: 'pie',
        data: {
            labels: ['Machos', 'Hembras'],
            datasets: [{
                data: datosSexo,
                backgroundColor: ['#3b82f6', '#ec4899'],
                borderWidth: 2,
                borderColor: '#ffffff',
                hoverOffset: 10
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' } }
        }
    });

    // 4. Configuración del Gráfico de Vacunas (Bar / Barras)
    new Chart(document.getElementById('graficoVacunas'), {
        type: 'bar',
        data: {
            labels: etiquetasVacunas,
            datasets: [{
                label: 'Caninos Inmunizados',
                data: conteoVacunas,
                backgroundColor: '#8b5cf6',
                borderRadius: 5,
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { 
                    beginAtZero: true, 
                    ticks: { stepSize: 1 } // Muestra solo números enteros
                }
            }
        }
    });
</script>
</body>
</html>
