<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Rescate - {{ perro.nombre }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-center p-4">

    <h2 class="text-danger mb-4">¡Hola! Soy {{ perro.nombre }} 🐾</h2>

    {% if perro.foto %}
        <img src="{{ url_for('static', filename='uploads/' + perro.foto) }}" class="rounded-circle shadow mb-4" width="180" height="180" style="object-fit: cover; border: 5px solid #dc3545;">
    {% else %}
        <div style="font-size: 5rem;">🐶</div>
    {% endif %}

    <p class="lead fw-bold">Si me encontraste caminando solo, por favor ayúdame.</p>
    <p>Soy parte del Censo Canino. Mi propietario registrado es: <strong>{{ perro.nombre_propietario }}</strong></p>

    <!-- Este botón activa el GPS -->
    <button id="btn-ubicacion" class="btn btn-danger btn-lg mt-3 w-100 shadow rounded-pill">
        📍 Enviar mi Ubicación Actual
    </button>

    <div id="mensaje" class="mt-4 fw-bold text-success fs-5"></div>

    <!-- Lógica de Geolocalización -->
    <script>
        document.getElementById('btn-ubicacion').addEventListener('click', function() {
            const btn = this;
            const mensaje = document.getElementById('mensaje');

            btn.innerText = "Calculando GPS...";
            btn.disabled = true;

            // Preguntamos al navegador por el GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Enviamos las coordenadas a la ruta de Flask que creamos en el Paso 1
                    fetch('/rescate/{{ perro.id }}', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat: lat, lon: lon })
                    }).then(res => res.json())
                      .then(data => {
                          mensaje.innerText = "¡Mil gracias! La ubicación exacta ha sido enviada a la base de datos central.";
                          btn.style.display = 'none'; // Ocultamos el botón
                      });
                }, function(error) {
                    mensaje.className = "mt-4 fw-bold text-danger";
                    mensaje.innerText = "Para enviar la ubicación, debes darle a 'Permitir' en el aviso de GPS de tu celular.";
                    btn.innerText = "📍 Reintentar";
                    btn.disabled = false;
                });
            } else {
                mensaje.innerText = "El navegador de este celular no soporta GPS.";
            }
        });
    </script>
</body>
</html>
