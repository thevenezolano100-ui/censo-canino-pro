<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Censo Canino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-login { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 40px 30px; background: white; }
        .btn { transition: all 0.3s; border-radius: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body>

<div class="card-login">
    <div class="text-center mb-4">
        <h1 style="font-size: 3rem; margin-bottom: 0;">🐾</h1>
        <h3 class="text-primary fw-bold mt-2">Censo Canino Pro</h3>
        <p class="text-muted small">Ingresa tus credenciales para continuar</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                {% for category, message in messages %}
                    Swal.fire({
                        icon: '{{ "success" if category == "success" else "error" }}',
                        title: '{{ "¡Éxito!" if category == "success" else "Aviso" }}',
                        text: '{{ message }}',
                        confirmButtonColor: '#0d6efd'
                    });
                {% endfor %}
            });
        </script>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label class="form-label fw-bold small text-secondary">Usuario / Correo</label>
            <input type="text" name="username" class="form-control bg-light border-0" placeholder="Ej: admin" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold small text-secondary">Contraseña</label>
            <input type="password" name="password" class="form-control bg-light border-0" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Iniciar Sesión</button>
    </form>

    <div class="text-center mt-4 pt-3 border-top">
        <p class="text-muted small mb-2">¿Eres nuevo en la plataforma?</p>
        <a href="{{ url_for('registro_publico') }}" class="btn btn-outline-success w-100 fw-bold py-2">📝 Crear Cuenta Nueva</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
