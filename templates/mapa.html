<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Global de Ubicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif;}
        #mapaGlobal { height: 85vh; width: 100%; border-radius: 15px; border: 3px solid #dee2e6; }
        /* Icono rojo personalizado para alertas QR */
        .alerta-qr-icon { filter: hue-rotate(150deg) saturate(3) brightness(1.2); }
    </style>
</head>
<body>
<div class="container-fluid mt-3 mb-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-primary fw-bold m-0">🗺️ Radar Global de Pacientes</h2>
        <a href="/" class="btn btn-secondary shadow-sm fw-bold">Volver al Panel Central</a>
    </div>
    
    <div class="card shadow-sm p-2">
        <div id="mapaGlobal"></div>
    </div>
    <div class="mt-2 text-center text-muted small fw-bold">
        🔵 Censo Normal | 🔴 Alerta de Extravío (Escaneado por QR en la calle)
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Inicializa el mapa centrado en el Estado Táchira
        var map = L.map('mapaGlobal').setView([7.7667, -72.2333], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Sistema de Geolocalización Pro'
        }).addTo(map);

        // Bucle Jinja que inyecta las coordenadas de TODOS los animales en el Javascript del navegador
        {% for p in perros %}
            {% if p.latitud != 0 and p.longitud != 0 %}
                
                // Determinamos si el animal es una alerta QR
                var esAlerta = "{{ p.situacion }}" === "¡ALERTA QR!";
                
                var markerColorClass = esAlerta ? "alerta-qr-icon" : "";
                
                // Icono por defecto de Leaflet, pero aplicamos filtro CSS si es alerta
                var myIcon = L.icon({
                    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    className: markerColorClass
                });

                var popupContent = "<b>🐾 {{ p.nombre or 'S/N' }}</b><br>" +
                                   "<b>Especie:</b> {{ p.especie }}<br>" +
                                   "<b>Dueño:</b> {{ p.nombre_propietario or 'Comunitario' }}<br>" +
                                   "<b>Estado:</b> <span style='color: " + (esAlerta ? 'red' : 'green') + "'>{{ p.situacion }}</span><br>" +
                                   "<a href='https://wa.me/{{ p.whatsapp_propietario }}' target='_blank'>Contactar Dueño</a>";

                L.marker([{{ p.latitud }}, {{ p.longitud }}], {icon: myIcon}).addTo(map)
                 .bindPopup(popupContent);
            {% endif %}
        {% endfor %}
    });
</script>
</body>
</html>
