<!DOCTYPE html>
<html>
<head>
    <title>Mapa Epidemiológico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #mapa-full { height: calc(100vh - 60px); width: 100%; background: #e0e0e0; }
        .nav-map { height: 60px; background: #212529; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;}
    </style>
</head>
<body>
    <div class="nav-map shadow"><h4 class="m-0">🗺️ Mapa de Monitoreo Epidemiológico</h4><a href="/" class="btn btn-outline-light btn-sm">Volver</a></div>
    <div id="mapa-full"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var map = L.map('mapa-full').setView([10.48, -66.90], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            var g = new L.featureGroup();
            {% for p in perros %}
                var c = "green";
                {% if p.estado_salud == 'Enfermo' %} c = "red";
                {% elif p.estado_salud == 'En Tratamiento' %} c = "orange"; {% endif %}
                var m = L.circleMarker([{{ p.latitud }}, {{ p.longitud }}], { radius: 8, fillColor: c, color: "#000", weight: 1, fillOpacity: 0.9 });
                m.bindPopup("<b>{{ p.nombre }}</b><br>Salud: {{ p.estado_salud }}<br>Situación: {{ p.situacion }}");
                g.addLayer(m);
            {% endfor %}
            if (g.getLayers().length > 0) { map.addLayer(g); map.fitBounds(g.getBounds(), {padding: [50, 50]}); }
            setTimeout(function(){ map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
