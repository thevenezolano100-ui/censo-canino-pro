<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | Censo Canino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 40px 15px; }
        .card-registro { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto; background: white; padding: 40px 30px;}
        .btn { transition: all 0.3s; border-radius: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .form-control { border-radius: 10px; padding: 10px 15px; background-color: #f8f9fa; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="card-registro">
    <div class="text-center mb-4">
        <h1 style="font-size: 2.5rem; margin-bottom: 0;">📝</h1>
        <h3 class="text-success fw-bold mt-2">Únete a la Red de Rescate</h3>
        <p class="text-muted small">Crea tu cuenta ciudadana para registrar peluditos</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                {% for category, message in messages %}
                    Swal.fire({
                        icon: 'error',
                        title: 'Aviso',
                        text: '{{ message }}',
                        confirmButtonColor: '#198754'
                    });
                {% endfor %}
            });
        </script>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/registro">
        <h6 class="text-primary border-bottom pb-2 mb-3">Datos Personales</h6>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold small text-secondary">Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small text-secondary">Apellido</label>
                <input type="text" name="apellido" class="form-control" required>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold small text-secondary">Cédula de Identidad</label>
                <input type="text" name="cedula" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small text-secondary">WhatsApp</label>
                <input type="text" name="whatsapp" class="form-control" placeholder="Ej: 584141234567" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold small text-secondary">Dirección / Sector</label>
            <input type="text" name="direccion" class="form-control" required>
        </div>

        <h6 class="text-primary border-bottom pb-2 mb-3">Datos de Acceso</h6>
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold small text-secondary">Usuario (Alias)</label>
                <input type="text" name="username" class="form-control" placeholder="Sin espacios" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small text-secondary">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-3 shadow-sm">Crear Mi Cuenta</button>
    </form>

    <div class="text-center mt-3 pt-3 border-top">
        <p class="text-muted small mb-2">¿Ya te habías registrado?</p>
        <a href="{{ url_for('login') }}" class="btn btn-outline-primary w-100 fw-bold py-2">Volver a Iniciar Sesión</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
